<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/scm-logo.jpg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d9488" />
    <meta
      name="description"
      content="Street Children Ministry — CTVET Vocational Skills Training management system."
    />
    <title>SCM · Vocational Training Management</title>

    <!-- Set the theme class before first paint so there is no light/dark flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('vtms-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored ? stored === 'dark' : prefersDark;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
